<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Settings</title>
</head>

<body>

    <div class="settings-container">
        <div class="settings-container-headline">
            <p class="m-0">Settings</p>
            <img src="./public/img/Line.svg" alt="Line Icon">
        </div>
        <div class="settings-game-container">
            <div class="settings-left">
                <div class="settings-box">
                    <div class="settings-box-headline">
                        <img src="./public/img/palette.svg" alt="">
                        <p>Game themes</p>
                    </div>
                    <div class="ml-50">
                        <div class="settings-circle-text">
                            <div>
                                <img src="./public/img/circle.svg" alt="">
                            </div>
                            <p>Theme 1</p>
                        </div>
                        <div class="settings-circle-text">
                            <div>
                                <img src="./public/img/circle.svg" alt="">
                            </div>
                            <p>Theme 2</p>
                        </div>
                    </div>
                </div>

                <div class="settings-box">
                    <div class="settings-box-headline">
                        <img src="./public/img/chess_pawn.svg" alt="">
                        <p>Choose player</p>
                    </div>
                    <div class="ml-50">
                        <div class="settings-circle-text">
                            <div>
                                <img src="./public/img/circle.svg" alt="">
                            </div>
                            <p>Blue</p>
                        </div>
                        <div class="settings-circle-text">
                            <div>
                                <img src="./public/img/circle.svg" alt="">
                            </div>
                            <p>Orange</p>
                        </div>
                    </div>
                </div>

                <div class="settings-box">
                    <div class="settings-box-headline">
                        <img src="./public/img/board.svg" alt="">
                        <p>Board size</p>
                    </div>
                    <div class="ml-50">
                        <div class="settings-circle-text">
                            <div>
                                <img src="./public/img/circle.svg" alt="">
                            </div>
                            <p>16 cards</p>
                        </div>
                        <div class="settings-circle-text">
                            <div>
                                <img src="./public/img/circle.svg" alt="">
                            </div>
                            <p>24 cards</p>
                        </div>
                        <div class="settings-circle-text">
                            <div>
                                <img src="./public/img/circle.svg" alt="">
                            </div>
                            <p>36 cards</p>
                        </div>
                    </div>
                </div>

            </div>

            <div class="settings-right">
                <img src="./public/img/CodeVibe.svg" alt="">

                <div class="settings-right-rectangle">
                    <p>Game theme</p>
                    <img src="./public/img/Line left.svg" alt="">
                    <p>Player</p>
                    <img src="./public/img/Line left.svg" alt="">
                    <p>Board size</p>
                    <button>
                        <img src="./public/img/play.svg" alt="">
                        <span>Start</span>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
