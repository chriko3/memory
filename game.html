<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <html translate="no">
    <title>Memory</title>
</head>

<body onload="gameInit()" id="body">
    <div class="game-container">
        <div class="game-info-container">
            <div class="game-points">
                <img class="player1Img" src="" alt="">
                <p class="player1Points">0</p>

                <img class="player2Img" src="" alt="">
                <p class="player2Points">0</p>
            </div>

            <div class="game-current-player">
                <p>Current player:</p>
                <img id="currentPlayer" src="" alt="">
            </div>

            <div class="game-exit">
                <button onclick="togglePopUp()">
                    <img id="exitIcon" src="./public/assets/img/exit.svg" alt="">
                    <span>Exit Game</span>
                </button>
            </div>
        </div>

        <div class="game" id="gameCanvas">
        </div>
    </div>

    <div class="overlay" id="exitPopUp" style="display: none;">
        <div class="exit-popup">
            <p>Are you sure you want to quit <br> the game?</p>
            <div>
                <button onclick="togglePopUp()">Back to game</button>
                <button onclick="exitGame()">Exit game</button>
            </div>
        </div>
    </div>

    <div class="overlay filled win" id="winScreen" style="display: none;">
        <div class="win">
            <p id="infoText">The winner is</p>
            <p id="playerWinnerText">XXX Player</p>
            <img id="winImg" src="" alt="">
            <button onclick="exitGame()">Back to start</button>
        </div>
    </div>

    <div class="overlay filled" id="gameOver" style="display: none;">
        <div class="game-over-screen">
            <p>GAME IS OVER</p>
            <div>
                <p>Final score</p>
                <div class="game-points">
                    <img class="player1Img" src="" alt="">
                    <p class="player1Points">0</p>

                    <img class="player2Img" src="" alt="">
                    <p class="player2Points">0</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/settings.ts"></script>
    <script type="module" src="/src/game.ts"></script>
    <script type="module" src="/src/template.ts"></script>
</body>

</html>
